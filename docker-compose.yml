services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockiq-backend
    restart: unless-stopped
    volumes:
      - stockiq-data:/data          # SQLite DB persistence
    environment:
      - DB_PATH=/data/stockiq.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockiq-frontend
    restart: unless-stopped
    ports:
      - "80:80"                     # Access the app at http://localhost
    depends_on:
      backend:
        condition: service_healthy

volumes:
  stockiq-data:
    driver: local
